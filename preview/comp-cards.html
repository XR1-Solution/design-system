<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css"></head><body><div class="pad">
  <p class="eyebrow">Panel / card</p>
  <div class="panel">
    <div class="phead"><span class="dot"></span><span class="ptitle">automation.flow</span><span class="pstat">ACTIVE</span></div>
    <div class="pbody">
      <div class="disp" style="font-size:24px;color:var(--fg-0);line-height:1.1">Invoice sync</div>
      <p class="mono" style="font-size:13px;color:var(--fg-2);margin:6px 0 0">Stripe → Notion · runs every 6h · last run 04:00</p>
    </div>
  </div><style>.panel{background:var(--bg-1);border:1px solid var(--line);border-radius:4px;overflow:hidden;max-width:440px}
.phead{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--bg-2)}
.dot{width:8px;height:8px;border-radius:99px;background:var(--green);box-shadow:0 0 8px var(--glow-green)}
.ptitle{font-family:var(--font-mono);font-size:13px;color:var(--fg-1);flex:1}
.pstat{font-family:var(--font-pixel);font-size:10px;color:var(--green);letter-spacing:.08em}
.pbody{padding:16px 14px}</style></body></html>
