<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css"></head><body><div class="pad">
  <p class="eyebrow">Terminal window</p>
  <div class="term">
    <div class="tbar"><span class="tb r"></span><span class="tb a"></span><span class="tb g"></span><span class="tname">~/xr1/atlas — zsh</span></div>
    <pre class="tbody"><span class="p">xr1 ❯</span> <span class="c">build</span> <span class="ar">--target web</span>
<span class="cm"># compiling 142 modules</span>
<span class="ok">✓ done in 3.4s</span>  <span class="ar">→ dist/</span>
<span class="p">xr1 ❯</span> <span class="cur">█</span></pre>
  </div><style>.term{background:var(--bg-inset);border:1px solid var(--line);border-radius:6px;overflow:hidden;max-width:460px;box-shadow:var(--shadow-2)}
.tbar{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--bg-2);border-bottom:1px solid var(--line)}
.tb{width:11px;height:11px;border-radius:99px}.tb.r{background:#F2706E}.tb.a{background:#F4BE5A}.tb.g{background:#6EE7A0}
.tname{margin-left:8px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
.tbody{margin:0;padding:14px;font-family:var(--font-mono);font-size:13px;line-height:1.7;color:var(--fg-1)}
.p{color:var(--green)}.c{color:var(--cyan)}.ar{color:var(--fg-3)}.cm{color:var(--fg-3)}.ok{color:var(--green)}
.cur{animation:bl 1s steps(1) infinite}@keyframes bl{50%{opacity:0}}</style></body></html>
