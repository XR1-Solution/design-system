<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css"></head><body><div class="pad">
  <p class="eyebrow">Status & tags</p>
  <div class="row" style="gap:10px;margin-bottom:14px">
    <span class="pill"><i style="background:var(--green)"></i>online</span>
    <span class="pill"><i style="background:var(--amber)"></i>building</span>
    <span class="pill"><i style="background:var(--red)"></i>failed</span>
    <span class="pill"><i style="background:var(--fg-3)"></i>idle</span>
  </div>
  <div class="row" style="gap:8px">
    <span class="tag">react</span><span class="tag">node</span><span class="tag">figma</span><span class="tag">n8n</span>
  </div><style>.pill{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:12px;color:var(--fg-1);background:var(--bg-2);border:1px solid var(--line);border-radius:99px;padding:4px 11px 4px 9px}
.pill i{width:7px;height:7px;border-radius:99px;display:inline-block}
.tag{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);border:1px solid var(--line);border-radius:2px;padding:3px 9px}
.tag::before{content:"# ";color:var(--green-dim)}</style></body></html>
