<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css"></head><body><div class="pad">
  <p class="eyebrow">Elevation — border-led, glow over shadow</p>
  <div class="row" style="gap:20px;align-items:stretch">
    <div style="text-align:center"><div style="width:120px;height:56px;background:var(--bg-2);border:1px solid var(--line);border-radius:4px;box-shadow:var(--shadow-2)"></div><div class="tok">shadow-2</div></div>
    <div style="text-align:center"><div style="width:120px;height:56px;background:var(--bg-2);border:1px solid var(--green);border-radius:4px;box-shadow:0 0 24px var(--glow-green)"></div><div class="tok">glow-soft</div></div>
    <div style="text-align:center"><div style="width:120px;height:56px;background:var(--bg-2);border-radius:4px;box-shadow:var(--ring-focus)"></div><div class="tok">ring-focus</div></div>
  </div>
</div></body></html>
