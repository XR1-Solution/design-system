<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css"></head><body><div class="pad">
  <p class="eyebrow">Primary green & semantic roles</p>
  <div class="row" style="gap:9px;align-items:stretch;margin-bottom:14px">
    <div style="flex:1;min-width:96px">
  <div style="height:48px;border-radius:var(--r-2);background:var(--green-dim)"></div>
  <div class="tok"><b>dim</b><br>#3FA56C</div></div>
    <div style="flex:1;min-width:96px">
  <div style="height:48px;border-radius:var(--r-2);background:var(--green)"></div>
  <div class="tok"><b>primary</b><br>#6EE7A0</div></div>
    <div style="flex:1;min-width:96px">
  <div style="height:48px;border-radius:var(--r-2);background:var(--green-bright)"></div>
  <div class="tok"><b>bright</b><br>#A6F4C5</div></div>
  </div>
  <div class="row" style="gap:8px">
    <span style="font-size:12px;color:var(--green);border:1px solid var(--green-dim);border-radius:99px;padding:3px 10px">success</span>
    <span style="font-size:12px;color:var(--amber);border:1px solid var(--amber);border-radius:99px;padding:3px 10px">warning</span>
    <span style="font-size:12px;color:var(--red);border:1px solid var(--red-dim);border-radius:99px;padding:3px 10px">danger</span>
    <span style="font-size:12px;color:var(--cyan);border:1px solid var(--cyan);border-radius:99px;padding:3px 10px">info</span>
  </div>
</div></body></html>
